<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottery · 预测控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--red" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--blue" aria-hidden="true"></div>

    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="brand__icon" aria-hidden="true">
            <span class="ball ball--red ball--sm"></span>
            <span class="ball ball--blue ball--sm"></span>
          </div>
          <div>
            <h1 class="brand__title">Lottery</h1>
            <p class="brand__sub">LSTM 预测控制台</p>
          </div>
        </div>
        <div class="header__meta">
          <div id="health-pill" class="pill pill--loading">
            <span class="pill__dot"></span>
            <span class="pill__text">连接中…</span>
          </div>
          <a class="link-api" href="/docs" target="_blank" rel="noopener">API 文档</a>
        </div>
      </header>

      <main class="layout">
        <aside class="panel panel--models">
          <div class="panel__head">
            <h2>模型</h2>
            <button id="btn-refresh-models" class="btn btn--ghost btn--icon" type="button" title="刷新列表">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                <path d="M21 3v6h-6" />
              </svg>
            </button>
          </div>
          <p class="panel__hint">选择训练产物并加载到内存</p>
          <div id="model-list" class="model-list" role="listbox" aria-label="可用模型"></div>
          <div class="panel__actions">
            <button id="btn-load" class="btn btn--secondary" type="button" disabled>加载模型</button>
          </div>
          <div id="loaded-model" class="loaded-model loaded-model--empty">
            <span class="loaded-model__label">当前</span>
            <span class="loaded-model__value">未加载</span>
          </div>
        </aside>

        <section class="panel panel--predict">
          <div class="panel__head">
            <h2>预测</h2>
            <label class="checkbox">
              <input id="save-summary" type="checkbox" />
              <span>保存到 summaries</span>
            </label>
          </div>

          <div id="result-empty" class="result-empty">
            <div class="result-empty__balls" aria-hidden="true">
              <span class="ball ball--red ball--lg"></span>
              <span class="ball ball--red ball--lg"></span>
              <span class="ball ball--red ball--lg"></span>
              <span class="ball ball--blue ball--lg"></span>
            </div>
            <p>加载模型后点击「运行预测」</p>
          </div>

          <div id="result" class="result hidden">
            <div class="balls-row">
              <div class="balls-group">
                <span class="balls-label">红球</span>
                <div id="red-balls" class="balls"></div>
              </div>
              <div class="balls-group balls-group--blue">
                <span class="balls-label">蓝球</span>
                <div id="blue-ball" class="balls"></div>
              </div>
            </div>
            <dl class="meta-grid">
              <div>
                <dt>模型</dt>
                <dd id="meta-model">—</dd>
              </div>
              <div>
                <dt>训练时间</dt>
                <dd id="meta-timestamp">—</dd>
              </div>
              <div>
                <dt>输入窗口</dt>
                <dd id="meta-window">—</dd>
              </div>
              <div>
                <dt>最近一期</dt>
                <dd id="meta-last-issue">—</dd>
              </div>
            </dl>
            <details class="details">
              <summary>归一化输出</summary>
              <pre id="meta-normalized" class="code-block"></pre>
            </details>
            <p id="meta-summary-path" class="summary-path hidden"></p>
          </div>

          <div class="panel__actions panel__actions--center">
            <button id="btn-predict" class="btn btn--primary btn--lg" type="button" disabled>
              <span class="btn__label">运行预测</span>
              <span class="btn__spinner hidden" aria-hidden="true"></span>
            </button>
            <button id="btn-reload-data" class="btn btn--ghost" type="button">刷新历史数据</button>
          </div>
        </section>
      </main>

      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    </div>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
